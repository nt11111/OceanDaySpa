  const I = {

  const GoogleLogo = ({ className='w-5 h-5' }: { className?:string }) => (
    <svg viewBox="0 0 24 24" className={className} aria-label="Google" role="img">
      <path fill="#4285F4" d="M23.5 12.27c0-.79-.07-1.54-.2-2.27H12v4.51h6.47a5.53 5.53 0 0 1-2.4 3.63v3h3.87c2.26-2.09 3.56-5.17 3.56-8.87z"/>
      <path fill="#34A853" d="M12 24c3.24 0 5.96-1.08 7.94-2.91l-3.87-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96H1.27v3.09A12 12 0 0 0 12 24z"/>

  const Reveal = ({ children, className='', delay=0 }: { children:any; className?:string; delay?:number }) => {
    const ref = useRef<HTMLDivElement>(null);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      const obs = new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting) { (e.target as HTMLElement).classList.add('in'); obs.unobserve(e.target); } }), { threshold: 0.12 });
      obs.observe(el); return () => obs.disconnect();
    }, []);
    return <div ref={ref} className={'reveal ' + className} style={{ transitionDelay: delay + 'ms' }}>{children}</div>;
  };

  const CountUp = ({ to, decimals=0, suffix='', className='' }: { to:number; decimals?:number; suffix?:string; className?:string }) => {
    const [val, setVal] = useState(0);
    const ref = useRef<HTMLSpanElement>(null);
    useEffect(() => {
      const el = ref.current; if (!el) return; let started=false;
      const obs = new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting && !started) { started=true; const dur=1400,t0=performance.now(); const tick=(t:number)=>{const p=Math.min(1,(t-t0)/dur);setVal(to*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);} }), { threshold:0.5 });
      obs.observe(el); return () => obs.disconnect();
    }, [to]);
    return <span ref={ref} className={className}>{val.toFixed(decimals)}{suffix}</span>;
  };

                  <span className="inline-flex items-center gap-1.5 rounded-full bg-brand-50 px-2.5 py-1" title={'Review from ' + t.source}>
                    <SourceBadge source={t.source} className="w-5 h-5" /><span className="font-heading text-[11px] font-semibold text-ink/60">{t.source}</span>
                  </span>
                </figcaption>
              </figure>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );

  /* ─────────────────────────  BOOK (call Kelly)  ───────────────────────── */
  const Book = () => (
    <section id="book" className="py-24 scroll-mt-16 bg-brand-600 text-white relative overflow-hidden">
      <div className="absolute -top-20 left-1/3 w-96 h-96 rounded-full bg-brand-500/50 blur-3xl animate-float-slow" />
      <div className="relative mx-auto max-w-3xl px-5 sm:px-8 text-center">
        <Reveal>
          <Eyebrow light>Booking</Eyebrow>
          <h2 className="mt-4 font-display text-4xl sm:text-5xl">Ready to unwind?</h2>
          <p className="mt-4 text-white/85 text-lg">No apps, no forms — just call <span className="font-semibold">{SPA.owner}</span> and she'll find the perfect time for you.</p>
          <a href={SPA.phoneHref} className="group mt-9 inline-flex items-center gap-4 rounded-full bg-white text-brand-600 font-heading font-bold pl-6 pr-7 py-4 shadow-glow hover:-translate-y-0.5 transition-transform cursor-pointer">
            <span className="grid place-items-center w-11 h-11 rounded-full bg-brand-500 text-white group-hover:scale-105 transition-transform"><Icon d={I.phone} className="w-5 h-5" /></span>
            <span className="text-left leading-tight">
              <span className="block text-xs uppercase tracking-wide text-brand-400">Call to book</span>
              <span className="block text-2xl">{SPA.phone}</span>
            </span>
          </a>
          <p className="mt-6 text-white/75 text-sm">Open 7 days · 10 AM – 9 PM · Walk-ins welcome</p>
        </Reveal>
      </div>
    </section>
  );

  /* ─────────────────────────  VISIT  ───────────────────────── */
  const Visit = () => (
    <section id="visit" className="py-24 scroll-mt-16 bg-white">
      <div className="mx-auto max-w-7xl px-5 sm:px-8 grid lg:grid-cols-2 gap-10 items-stretch">
        <Reveal>
          <div className="rounded-3xl overflow-hidden shadow-card ring-1 ring-brand-100 h-full bg-white group">
            <div className="h-64 overflow-hidden"><SpaImage src="images/ods15.webp" alt="Ocean Day Spa storefront in Mission Plaza" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" /></div>
            <div className="p-8">
              <Eyebrow>Plan Your Visit</Eyebrow>
              <h2 className="mt-4 font-display text-4xl text-navy">Come see us</h2>
              <ul className="mt-6 space-y-5">
                <li className="flex items-start gap-4"><Icon d={I.pin} className="w-6 h-6 text-brand-500 shrink-0 mt-0.5" /><span><span className="block font-heading font-semibold text-navy">{SPA.address}</span><span className="text-ink/65">{SPA.city} · {SPA.plaza}</span></span></li>
                <li className="flex items-start gap-4"><Icon d={I.clock} className="w-6 h-6 text-brand-500 shrink-0 mt-0.5" /><span><span className="block font-heading font-semibold text-navy">Open 7 days</span><span className="text-ink/65">10:00 AM – 9:00 PM</span></span></li>
                <li className="flex items-start gap-4"><Icon d={I.phone} className="w-6 h-6 text-brand-500 shrink-0 mt-0.5" /><a href={SPA.phoneHref} className="font-heading font-semibold text-navy hover:text-brand-600 transition-colors">{SPA.phone}</a></li>
              </ul>
              <div className="mt-8 flex flex-wrap gap-3">
                <CallButton className="!px-7" />
                <a href={SPA.mapHref} target="_blank" rel="noopener" className="inline-flex items-center gap-2 rounded-full bg-brand-50 hover:bg-brand-100 text-brand-600 px-6 py-3.5 font-heading font-medium transition-colors cursor-pointer"><Icon d={I.pin} className="w-5 h-5" /> Directions</a>
              </div>
            </div>
          </div>
        </Reveal>
        <Reveal delay={120}>
          <div className="rounded-3xl overflow-hidden shadow-card ring-1 ring-brand-100 h-full min-h-[380px]">
            <iframe title="Ocean Day Spa location map" className="w-full h-full min-h-[380px] border-0" loading="lazy" referrerPolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=1989%20Santa%20Rita%20Rd%20Ste%20B%2C%20Pleasanton%2C%20CA%2094566&output=embed"></iframe>
          </div>
        </Reveal>
      </div>
    </section>
  );

  /* ─────────────────────────  FOOTER  ───────────────────────── */
  const Footer = () => (
    <footer className="bg-navy text-white/80">
      <div className="mx-auto max-w-7xl px-5 sm:px-8 py-14 grid gap-10 md:grid-cols-3">
        <div>
          <img src={LOGO} alt="Ocean Day Spa" className="h-12 w-auto bg-white rounded-xl px-3 py-2" />
          <p className="mt-4 max-w-xs text-sm leading-relaxed">Your calm harbor in Pleasanton. Skilled, caring massage in a clean, tranquil space — call Kelly and feel the difference.</p>
          <div className="mt-4"><Stars n={SPA.rating} /> <span className="text-sm">{SPA.rating} · {SPA.reviewCount} reviews</span></div>
        </div>
        <div>
          <h4 className="font-heading font-semibold text-white">Explore</h4>
          <ul className="mt-4 space-y-2 text-sm">
            {[['Services','services'],['About Kelly','about'],['Gallery','gallery'],['Reviews','reviews'],['Visit','visit']].map(([l,id]) => (
              <li key={id}><button onClick={() => scrollToId(id)} className="hover:text-seafoam-200 cursor-pointer">{l}</button></li>
            ))}
          </ul>
        </div>
        <div>
          <h4 className="font-heading font-semibold text-white">Visit &amp; Book</h4>
          <ul className="mt-4 space-y-2 text-sm">
            <li>{SPA.address}</li><li>{SPA.city}</li><li>Open 7 days · 10 AM – 9 PM</li>
            <li><a href={SPA.phoneHref} className="hover:text-seafoam-200 font-semibold">{SPA.phone}</a></li>
            <li><a href={SPA.websiteHref} target="_blank" rel="noopener" className="hover:text-seafoam-200">{SPA.website}</a></li>
          </ul>
        </div>
      </div>
      <div className="border-t border-white/10">
        <div className="mx-auto max-w-7xl px-5 sm:px-8 py-5 text-xs flex flex-col sm:flex-row gap-2 justify-between">
          <span>© {new Date().getFullYear()} Ocean Day Spa · Pleasanton, CA</span>
          <span>Walk-ins welcome · Wheelchair accessible · Cards accepted</span>
        </div>
      </div>
    </footer>
  );

  /* sticky mobile call bar */
  const MobileCallBar = () => {
    const [show, setShow] = useState(false);
    useEffect(() => { const onScroll=()=>setShow(window.scrollY>600); window.addEventListener('scroll',onScroll,{passive:true}); return ()=>window.removeEventListener('scroll',onScroll); }, []);
    return (
      <div className={'md:hidden fixed bottom-0 inset-x-0 z-40 p-3 bg-white/95 backdrop-blur border-t border-brand-100 transition-transform duration-300 ' + (show ? 'translate-y-0' : 'translate-y-full')}>
        <CallButton className="w-full" label={'Call to Book · ' + SPA.phone} />
      </div>
    );
  };

  /* ─────────────────────────  APP  ───────────────────────── */
  const App = () => {
    const [lb, setLb] = useState<number|null>(null);
    const nav = (d:number) => setLb(i => i===null ? i : (i + d + GALLERY.length) % GALLERY.length);
    return (
      <>
        <NavBar />
        <main>
          <Hero />
          <Marquee />
          <Sale />
          <Services />
          <WhyUs />
          <Gallery onOpen={setLb} />
          <About />
          <Testimonials />
          <Book />
          <Visit />
        </main>
        <Footer />
        <MobileCallBar />
        <Lightbox index={lb} onClose={() => setLb(null)} onNav={nav} />
      </>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    (function () {
      try {
        var src = document.getElementById('app-source').textContent;
        var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }], 'typescript'], filename: 'app.tsx' }).code;
        var s = document.createElement('script'); s.textContent = out; document.body.appendChild(s);
      } catch (err) {
        console.error(err);
        document.getElementById('root').innerHTML = '<pre style="padding:24px;color:#b00020;font-family:monospace;white-space:pre-wrap">Could not start the site: ' + err + '</pre>';
      }
    })();
  </script>
</body>
</html>
